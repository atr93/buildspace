name: Portfolio Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  web-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - web-apps/advanced/admin-analytics-dashboard
          - web-apps/intermediate/expense-flow-tracker
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Log analyzer smoke test
        run: python3 python-tools/intermediate/log-analyzer-cli/src/main.py --file python-tools/intermediate/log-analyzer-cli/sample_data/app.log
      - name: Quick calc smoke test
        run: python3 python-tools/easy/quick-calc-cli/main.py op add 2 3
