name: Portfolio Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  web-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - web-apps/advanced/admin-analytics-dashboard
          - web-apps/advanced/secure-notes-app
          - web-apps/advanced/network-traffic-dashboard
          - web-apps/intermediate/expense-flow-tracker
          - web-apps/intermediate/rideflow-dispatch
          - web-apps/intermediate/crypto-exchange-sim
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set npm registry
        run: npm config set registry https://registry.npmjs.org/
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Offline integrity check
        run: python3 scripts/offline_integrity_check.py
      - name: Install crypto analyzer dependencies
        run: pip install -r python-tools/advanced/crypto-key-analyzer/requirements.txt
      - name: Log analyzer smoke test
        run: python3 python-tools/intermediate/log-analyzer-cli/src/main.py --file python-tools/intermediate/log-analyzer-cli/sample_data/app.log
      - name: Quick calc smoke test
        run: python3 python-tools/easy/quick-calc-cli/main.py op add 2 3
      - name: Crypto analyzer smoke test
        run: python3 python-tools/advanced/crypto-key-analyzer/main.py --key 0x1a2b3c
      - name: Python compile checks
        run: python3 -m py_compile python-tools/easy/quick-calc-cli/main.py python-tools/intermediate/log-analyzer-cli/src/main.py python-tools/advanced/crypto-key-analyzer/main.py
